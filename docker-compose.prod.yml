# =============================================================================
# PRANELY - Docker Compose Production
# Staging/Production: Postgres + Redis + Frontend + Backend (blue-green ready)
# =============================================================================

services:
  # -----------------------------------------------------------------------------
  # PostgreSQL 16 - Base de datos producción
  # -----------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: pranely-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: pranely
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: pranely_prod
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pranely -d pranely_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - pranely-network-prod

  # -----------------------------------------------------------------------------
  # Redis 7 - Cache y colas producción
  # -----------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: pranely-redis-prod
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru --save 60 1 --save 300 10
    ports:
      - "6379:6379"
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    networks:
      - pranely-network-prod

  # -----------------------------------------------------------------------------
  # Frontend - Next.js (blue-green ready)
  # -----------------------------------------------------------------------------
  frontend-blue:
    build:
      context: packages/frontend
      dockerfile: Dockerfile
    image: pranely-frontend:blue
    container_name: pranely-frontend-blue
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:8000}
      NEXT_PUBLIC_APP_URL: ${APP_URL:-http://localhost:3000}
    ports:
      - "3000:3000"
    depends_on:
      backend-green:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - pranely-network-prod

  frontend-green:
    build:
      context: packages/frontend
      dockerfile: Dockerfile
    image: pranely-frontend:green
    container_name: pranely-frontend-green
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:8000}
      NEXT_PUBLIC_APP_URL: ${APP_URL:-http://localhost:3000}
    ports:
      - "3001:3000"
    depends_on:
      backend-green:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - pranely-network-prod

  # -----------------------------------------------------------------------------
  # Backend - FastAPI (blue-green ready)
  # -----------------------------------------------------------------------------
  backend-blue:
    build:
      context: packages/backend
      dockerfile: Dockerfile
    image: pranely-backend:blue
    container_name: pranely-backend-blue
    restart: unless-stopped
    command: poetry run uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    ports:
      - "8000:8000"
    env_file:
      - packages/backend/.env.production
    environment:
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY required}
      DATABASE_URL: postgresql+asyncpg://pranely:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}@postgres:5432/pranely_prod
      PYTHONPATH: /app
      TZ: "America/Mexico_City"
    volumes:
      - backend_logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
        compress: "true"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - pranely-network-prod

  backend-green:
    build:
      context: packages/backend
      dockerfile: Dockerfile
    image: pranely-backend:green
    container_name: pranely-backend-green
    restart: unless-stopped
    command: poetry run uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    ports:
      - "8001:8000"
    env_file:
      - packages/backend/.env.production
    environment:
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY required}
      DATABASE_URL: postgresql+asyncpg://pranely:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}@postgres:5432/pranely_prod
      PYTHONPATH: /app
      TZ: "America/Mexico_City"
    volumes:
      - backend_logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"
        compress: "true"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    networks:
      - pranely-network-prod

  # -----------------------------------------------------------------------------
  # Nginx - Reverse proxy (blue-green switch)
  # -----------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: pranely-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./configs/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./configs/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - frontend-blue
      - backend-blue
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - pranely-network-prod

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_prod_data:
    name: pranely-postgres-prod-data
  redis_prod_data:
    name: pranely-redis-prod-data
  backend_logs:
    name: pranely-backend-logs
  nginx_logs:
    name: pranely-nginx-logs

# =============================================================================
# Networks
# =============================================================================
networks:
  pranely-network-prod:
    name: pranely-network-prod
    driver: bridge
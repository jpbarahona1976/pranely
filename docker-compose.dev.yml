# =============================================================================
# PRANELY - Docker Compose Dev (Fase 1)
# Desarrollo: Postgres + Redis + Frontend + Backend con hot reload
# =============================================================================

services:
  # -----------------------------------------------------------------------------
  # PostgreSQL 16 - Base de datos (extiende de base.yml)
  # -----------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: pranely-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pranely
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: pranely_dev
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pranely -d pranely_dev"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - pranely-network

  # -----------------------------------------------------------------------------
  # Redis 7 - Cache y colas (extiende de base.yml)
  # -----------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: pranely-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - pranely-network

  # -----------------------------------------------------------------------------
  # Frontend - Next.js con hot reload
  # -----------------------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    image: pranely-frontend:dev
    container_name: pranely-frontend
    restart: unless-stopped
    command: pnpm dev
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    volumes:
      - ./packages/frontend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - pranely-network

  # -----------------------------------------------------------------------------
  # Backend - FastAPI con hot reload
  # -----------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    image: pranely-backend:dev
    container_name: pranely-backend
    restart: unless-stopped
    command: sh -c "cd /app && poetry install --no-interaction && poetry run uvicorn app.main:app --reload --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://pranely:changeme@postgres:5432/pranely_dev
      REDIS_URL: redis://redis:6379
      ENV: development
      PYTHONPATH: /app
    volumes:
      - ./packages/backend:/app
      - /app/.venv
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pranely-network

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    name: pranely-postgres-data
  redis_data:
    name: pranely-redis-data

# =============================================================================
# Networks
# =============================================================================
networks:
  pranely-network:
    name: pranely-network
    driver: bridge

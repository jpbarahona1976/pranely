# =============================================================================
# PRANELY - Docker Compose Dev (0B)
# Desarrollo completo: Postgres + Redis + Frontend + Backend
# =============================================================================

services:
  # -----------------------------------------------------------------------------
  # PostgreSQL 16 - Base de datos principal
  # -----------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: pranely-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pranely
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: pranely_dev
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pranely -d pranely_dev"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - pranely-network

  # -----------------------------------------------------------------------------
  # Redis 7 - Cache y colas
  # -----------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: pranely-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - pranely-network

  # -----------------------------------------------------------------------------
  # Frontend - Next.js
  # -----------------------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    image: pranely-frontend:0b
    container_name: pranely-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    volumes:
      - ./packages/frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - pranely-network

  # -----------------------------------------------------------------------------
  # Backend - FastAPI
  # -----------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    image: pranely-backend:0b
    container_name: pranely-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://pranely:changeme@postgres:5432/pranely_dev
      REDIS_URL: redis://redis:6379
      ENVIRONMENT: development
      LOG_LEVEL: INFO
    volumes:
      - ./packages/backend:/app
      - backend_venv:/app/.venv
      - backend_pycache:/app/__pycache__
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pranely-network

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    name: pranely-postgres-data
  redis_data:
    name: pranely-redis-data
  frontend_node_modules:
    name: pranely-frontend-node-modules
  frontend_next_cache:
    name: pranely-frontend-next-cache
  backend_venv:
    name: pranely-backend-venv
  backend_pycache:
    name: pranely-backend-pycache

# =============================================================================
# Networks
# =============================================================================
networks:
  pranely-network:
    name: pranely-network
    driver: bridge

# =============================================================================
# PRANELY - Docker Compose Dev
# Desarrollo completo: Postgres + Redis + App services
# =============================================================================

services:
  # -----------------------------------------------------------------------------
  # Inherit from base
  # -----------------------------------------------------------------------------
  postgres:
    extends:
      file: docker-compose.base.yml
      service: postgres

  redis:
    extends:
      file: docker-compose.base.yml
      service: redis

  # -----------------------------------------------------------------------------
  # Frontend - Next.js
  # -----------------------------------------------------------------------------
  frontend:
    build:
      context: ./packages/frontend
      dockerfile: Dockerfile
    container_name: pranely-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://backend:8000
    volumes:
      - ./packages/frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - pranely-network

  # -----------------------------------------------------------------------------
  # Backend - FastAPI
  # -----------------------------------------------------------------------------
  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    container_name: pranely-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://pranely:changeme@postgres:5432/pranely_dev
      REDIS_URL: redis://redis:6379
      ENVIRONMENT: development
    volumes:
      - ./packages/backend:/app
      - /app/__pycache__
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pranely-network

# =============================================================================
# Networks
# =============================================================================
networks:
  pranely-network:
    name: pranely-network
    driver: bridge

# =============================================================================
# PRANELY - Docker Compose Dev (Fase 1)
# Desarrollo: Postgres + Redis + Frontend + Backend con hot reload
# =============================================================================

services:
  # -----------------------------------------------------------------------------
  # PostgreSQL 16 - Base de datos (extiende de base.yml)
  # -----------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: pranely-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pranely
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: pranely_dev
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pranely -d pranely_dev"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - pranely-network

  # -----------------------------------------------------------------------------
  # Redis 7 - Cache y colas (extiende de base.yml)
  # -----------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: pranely-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - pranely-network

  # -----------------------------------------------------------------------------
  # Frontend - Next.js con hot reload
  # -----------------------------------------------------------------------------
  frontend:
    build:
      context: packages/frontend
      dockerfile: Dockerfile
    image: pranely-frontend:dev
    container_name: pranely-frontend
    restart: unless-stopped
    command: pnpm dev
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    volumes:
      - ./packages/frontend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - pranely-network

  # -----------------------------------------------------------------------------
  # Backend - FastAPI con hot reload
  # -----------------------------------------------------------------------------
  backend:
    build:
      context: packages/backend
      dockerfile: Dockerfile
    image: pranely-backend:dev
    container_name: pranely-backend
    restart: unless-stopped
    command: sh -c "cd /app && poetry lock --no-update && poetry install --no-interaction --no-cache && poetry run uvicorn app.main:app --reload --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    env_file:
      - packages/backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://pranely:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}@postgres:5432/pranely_dev
      PYTHONPATH: /app
    volumes:
      - ./packages/backend:/app
      - /app/.venv
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request, urllib.error; urllib.request.urlopen('http://localhost:8000/api/health', timeout=2); print('ok')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pranely-network

  # -----------------------------------------------------------------------------
  # Worker - RQ Worker para procesamiento asíncrono (Fase 7A)
  # -----------------------------------------------------------------------------
  worker:
    build:
      context: packages/backend
      dockerfile: Dockerfile
    image: pranely-worker:dev
    container_name: pranely-worker
    restart: unless-stopped
    command: sh -c "poetry install --no-interaction && poetry run python -m app.workers.runner --verbose"
    env_file:
      - packages/backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://pranely:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}@postgres:5432/pranely_dev
      REDIS_URL: redis://redis:6379
      PYTHONPATH: /app
    volumes:
      - ./packages/backend:/app
      - /app/.venv
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pranely-network

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    name: pranely-postgres-data
  redis_data:
    name: pranely-redis-data

# =============================================================================
# Prometheus Exporter Sidecar (optional, for docker environments)
# -----------------------------------------------------------------------------
  prometheus-exporter:
    image: prometheus-community/prometheus-node-exporter:latest
    container_name: pranely-prometheus-exporter
    restart: unless-stopped
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($|/)'
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - pranely-network

# =============================================================================
# Networks
# =============================================================================
networks:
  pranely-network:
    name: pranely-network
    driver: bridge

# PRANELY - Staging Deploy Pipeline
name: Deploy Staging

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Pre-deploy validation
  # ---------------------------------------------------------------------------
  pre-deploy:
    name: Pre-Deploy Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=ref,event=branch

      - name: Validate docker-compose
        run: |
          docker compose -f docker-compose.prod.yml config --quiet

      - name: Check secrets
        run: |
          docker run --rm -v $(pwd):/workspace ghcr.io/gitleaks/gitleaks:v9 detect \
            --source /workspace \
            --verbose \
            --config .gitleaks.toml \
            || echo "WARNING: gitleaks issues found"

  # ---------------------------------------------------------------------------
  # Job 2: Build images
  # ---------------------------------------------------------------------------
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: pre-deploy
    strategy:
      matrix:
        service: [backend, frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for backend
        if: matrix.service == 'backend'
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=

      - name: Extract metadata for frontend
        if: matrix.service == 'frontend'
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=

      - name: Build and push backend
        if: matrix.service == 'backend'
        uses: docker/build-push-action@v5
        with:
          context: ./packages/backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        if: matrix.service == 'frontend'
        uses: docker/build-push-action@v5
        with:
          context: ./packages/frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Job 3: Deploy to staging
  # ---------------------------------------------------------------------------
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull images
        run: |
          docker compose -f docker-compose.staging.yml pull

      - name: Stop old containers
        run: |
          docker compose -f docker-compose.staging.yml down

      - name: Start services
        run: |
          docker compose -f docker-compose.staging.yml up -d

      - name: Wait for health checks
        run: |
          echo "Waiting for services to be healthy..."
          sleep 30

  # ---------------------------------------------------------------------------
  # Job 4: Smoke tests post-deploy
  # ---------------------------------------------------------------------------
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run health check
        run: |
          curl -f http://staging.pranely.com/api/health || exit 1

      - name: Run DB health check
        run: |
          curl -f http://staging.pranely.com/api/health/db || exit 1

      - name: Run Redis health check
        run: |
          curl -f http://staging.pranely.com/api/health/redis || exit 1

      - name: Run tenant isolation check
        run: |
          curl -f http://staging.pranely.com/api/health/tenant || exit 1

      - name: Run deep health check
        run: |
          curl -f http://staging.pranely.com/api/health/deep || exit 1

  # ---------------------------------------------------------------------------
  # Job 5: Notify on success/failure
  # ---------------------------------------------------------------------------
  notify:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: [deploy-staging, smoke-tests]
    if: always()
    steps:
      - name: Send success notification
        if: needs.deploy-staging.result == 'success' && needs.smoke-tests.result == 'success'
        run: |
          echo "Deployment successful!"

      - name: Send failure notification
        if: needs.deploy-staging.result == 'failure' || needs.smoke-tests.result == 'failure'
        run: |
          echo "Deployment failed!"
          exit 1

  # ---------------------------------------------------------------------------
  # Job 6: Create GitHub Release
  # ---------------------------------------------------------------------------
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: smoke-tests
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: CHANGELOG.md
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
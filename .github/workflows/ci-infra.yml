# =============================================================================
# PRANELY - Infrastructure Validation CI
# FASE 1 - Secrets and Infrastructure
# =============================================================================

name: Infrastructure Validation

on:
  push:
    branches: [main, develop]
    paths:
      - 'infrastructure/**'
      - 'scripts/**'
      - 'configs/**'
      - '.github/workflows/ci-infra.yml'
  pull_request:
    branches: [main]
    paths:
      - 'infrastructure/**'
      - 'scripts/**'
      - 'configs/**'
      - '.github/workflows/ci-infra.yml'

env:
  PYTHON_VERSION: '3.12'

jobs:
  # ===========================================================================
  # Job 1: Terraform Validation
  # ===========================================================================
  terraform-validation:
    name: Terraform Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Terraform Directory
        id: tf-check
        run: |
          if exist "infrastructure\terraform" (
            echo "exists=true" >> %GITHUB_OUTPUT%
            echo "path=infrastructure\terraform" >> %GITHUB_OUTPUT%
          ) else (
            echo "exists=false" >> %GITHUB_OUTPUT%
            echo "path=" >> %GITHUB_OUTPUT%
            echo No terraform directory found
          )

      - name: Setup Terraform
        if: steps.tf-check.outputs.exists == 'true'
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: Terraform Init
        if: steps.tf-check.outputs.exists == 'true'
        working-directory: ${{ steps.tf-check.outputs.path }}
        run: |
          echo ## Terraform Init
          terraform init -input=false
          if errorlevel 1 (
            echo ❌ Terraform init failed
            exit /b 1
          )

      - name: Terraform Validate
        if: steps.tf-check.outputs.exists == 'true'
        working-directory: ${{ steps.tf-check.outputs.path }}
        run: |
          echo ## Terraform Validate
          terraform validate
          if errorlevel 1 (
            echo ❌ Terraform validate failed
            exit /b 1
          )
          echo ✅ Terraform validation passed

  # ===========================================================================
  # Job 2: Ansible Validation
  # ===========================================================================
  ansible-validation:
    name: Ansible Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Ansible Directory
        id: ansible-check
        run: |
          if exist "infrastructure\ansible" (
            echo "exists=true" >> %GITHUB_OUTPUT%
            echo "path=infrastructure\ansible" >> %GITHUB_OUTPUT%
          ) else (
            echo "exists=false" >> %GITHUB_OUTPUT%
            echo "path=" >> %GITHUB_OUTPUT%
            echo No ansible directory found
          )

      - name: Setup Python
        if: steps.ansible-check.outputs.exists == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Ansible
        if: steps.ansible-check.outputs.exists == 'true'
        run: pip install ansible ansible-lint

      - name: Ansible Syntax Check
        if: steps.ansible-check.outputs.exists == 'true'
        working-directory: ${{ steps.ansible-check.outputs.path }}
        run: |
          echo ## Ansible Syntax Check
          ansible-playbook --syntax-check playbooks\*.yml
          if errorlevel 1 (
            echo ❌ Ansible syntax check failed
            exit /b 1
          )
          echo ✅ Ansible syntax OK

  # ===========================================================================
  # Job 3: Scripts Validation
  # ===========================================================================
  scripts-validation:
    name: Scripts Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Python Scripts
        run: |
          echo ## Python Script Validation
          python -m py_compile scripts\*.py 2>nul || echo No python scripts found

      - name: Validate Shell Scripts
        run: |
          echo ## Shell Script Validation
          where shellcheck >nul 2>&1 || echo shellcheck not installed, skipping

  # ===========================================================================
  # Job 4: Config Files Validation
  # ===========================================================================
  config-validation:
    name: Config Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Compose
        run: |
          echo ## Docker Compose Validation
          docker compose -f docker-compose.dev.yml config --quiet
          if errorlevel 1 (
            echo ❌ Docker compose validation failed
            exit /b 1
          )
          echo ✅ Docker compose files passed

  # ===========================================================================
  # Job 5: Security Scan
  # ===========================================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          config-path: .gitleaks.toml


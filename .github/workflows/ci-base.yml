# =============================================================================
# PRANELY - CI Base Workflow
# Lint, Test, Security Scan
# =============================================================================

name: CI Base

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'docs/**'
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22.13.1"
  PYTHON_VERSION: "3.12.7"
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  # =============================================================================
  # Lint & Type Check
  # =============================================================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: 'packages/frontend/pnpm-lock.yaml'

      - name: Install pnpm
        run: npm install -g pnpm@9.12.2

      - name: Install dependencies
        working-directory: packages/frontend
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        working-directory: packages/frontend
        run: pnpm exec tsc --noEmit

      - name: ESLint
        working-directory: packages/frontend
        run: pnpm run lint

      - name: Python lint
        run: |
          python -m pip install ruff==0.8.0
          ruff check packages/backend/

  # =============================================================================
  # Unit Tests
  # =============================================================================
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install pnpm
        run: npm install -g pnpm@9.12.2

      - name: Install dependencies
        working-directory: packages/frontend
        run: pnpm install --frozen-lockfile

      - name: Run tests (Frontend)
        working-directory: packages/frontend
        run: pnpm test --coverage --coverage-threshold=80

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Poetry
        run: pip install poetry==1.8.3

      - name: Install dependencies (Backend)
        working-directory: packages/backend
        run: poetry install --no-interaction

      - name: Run tests (Backend)
        working-directory: packages/backend
        run: poetry run pytest --cov=app --cov-fail-under=80

  # =============================================================================
  # Security Scan - Gitleaks
  # =============================================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          config-path: .gitleaks.toml
        continue-on-error: false

      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "config"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"

      - name: Upload results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"

  # =============================================================================
  # GitHub Actions Validation - Act
  # =============================================================================
  act-structure:
    name: Validate with Act
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Act (structure job only)
        uses: nektos/act@master
        with:
          task: structure
          artifact-server-name: localhost

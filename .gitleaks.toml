# =============================================================================
# PRANELY - Gitleaks Configuration
# Secrets detection
# =============================================================================

[allowlist]
  description = "PRANELY allowed patterns"
  paths = [
    'docs/.*',
    'quarantine/.*',
    '.*\\.md',
    'LICENSE',
    'packages/backend/tests/.*',
    '.agents/.*',
    'PROTOCOLO DE RECONSTRUCCIÓN Y ROADMAP/.*',
    '\\.github/.*',
  ]

[[rules]]
  id = "pranely-api-key"
  description = "PRANELY API Key"
  regex = '''(?i)(pranely[_-]?api[_-]?key)[=:\s]['"''][a-zA-Z0-9]{20,}['"'']'''
  tags = ["key", "pranely"]

[[rules]]
  id = "generic-api-key"
  description = "Generic API Key"
  regex = '''(?i)(api[_-]?key)[=:\s]['"''][a-zA-Z0-9]{32,}['"'']'''
  tags = ["key", "api"]

[[rules]]
  id = "generic-password"
  description = "Generic Password"
  regex = '''(?i)password\s*[=:]\s*['"''].{8,}['"'']'''
  tags = ["secret", "password"]

[[rules]]
  id = "github-token"
  description = "GitHub Token"
  regex = '''(ghp|gho|ghu|ghs|ghr)_[A-Za-z0-9_]{36,}'''
  tags = ["key", "github"]

[[rules]]
  id = "docker-config"
  description = "Docker config auth"
  regex = '''\"auths\":\s*\{[^}]*"[a-zA-Z0-9]+"'''
  tags = ["secret", "docker"]

[[rules]]
  id = "env-file"
  description = "Environment file with secrets"
  regex = '''^\.env(\.[a-z]+)?$'''
  tags = ["file"]
